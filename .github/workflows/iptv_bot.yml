name: Bot Auto-Rotación IPTV

on:
  schedule:
    # Se ejecuta todos los días a las 6:00 AM UTC (1:00 AM Hora de Colombia)
    - cron: '0 6 * * *'
  workflow_dispatch: # Permite que lo ejecutes manualmente con un botón

jobs:
  actualizar-servidor:
    runs-on: ubuntu-latest
    
    # Da permisos de escritura al token de GitHub para poder hacer el commit
    permissions:
      contents: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar script de búsqueda
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
        run: python cardshare_telegram.py

      - name: Guardar nueva URL (Commit automático)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add server.txt
          
          # Si el archivo server.txt fue modificado, hace un commit y push
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Servidor IPTV actualizado" && git push)
