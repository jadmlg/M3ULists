name: Actualizar Lista Semanal

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Ejecutar script de actualización
        run: python actualizar_lista.py

      - name: Sincronizar y Guardar cambios en GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # PASO 1: Agregamos los archivos modificados por el robot (Cerrar las puertas)
          git add lista_final_perfecta.m3u canales_invalidos.m3u servidores.txt servidores_out.txt
          
          # PASO 2: Hacemos el commit LOCAL primero
          git commit -m "Actualización automática: Listas, Historial y Alertas" || echo "No hay cambios para subir"
          
          # PASO 3: Ahora sí, traemos lo de la nube y lo combinamos (Sincronizar)
          git pull origin main --rebase
          
          # PASO 4: Subimos todo finalmente
          git push origin main
